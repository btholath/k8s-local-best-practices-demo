# Item 6: Secret management plan
#
# WHAT THIS FILE IS: a plain Kubernetes Secret, good enough for local
# kind-cluster testing. It is base64-encoded, NOT encrypted — do not
# treat this pattern as sufficient for a real cluster.
#
# THE ACTUAL PLAN FOR NON-LOCAL / PRODUCTION USE:
#   1. Never commit real secret values to git, including as plain
#      Kubernetes Secret manifests (base64 is not encryption).
#   2. Use one of:
#      - Sealed Secrets (bitnami-labs/sealed-secrets): encrypts secrets
#        so the *encrypted* form is safe to commit; only the in-cluster
#        controller can decrypt them.
#      - External Secrets Operator: syncs secrets from Vault / AWS
#        Secrets Manager / GCP Secret Manager into native k8s Secret
#        objects at runtime; nothing sensitive ever touches git.
#      - SOPS + age/KMS: encrypt the YAML file itself before commit,
#        decrypt at apply-time via a CI step or Flux/ArgoCD SOPS plugin.
#   3. Mount secrets as env vars (below) or as files via volumeMounts —
#      prefer files + read-only mounts for anything highly sensitive,
#      since env vars can leak more easily via process listings, crash
#      dumps, or child process inheritance.
#   4. Enable encryption-at-rest for the etcd Secret resource itself
#      (EncryptionConfiguration on the API server) — a plain Secret
#      object is only base64 in etcd unless this is turned on.
#   5. Restrict who/what can `kubectl get secret` via RBAC; secrets
#      readable by any authenticated user defeats the point.

apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: demo-dev
type: Opaque
stringData:
  API_TOKEN: "demo-local-only-token-do-not-use-in-real-envs"
