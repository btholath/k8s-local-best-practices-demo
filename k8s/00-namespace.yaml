# Item 15: Namespace isolation strategy
# One namespace per environment, each with its own ResourceQuota so a
# runaway dev deployment can't starve staging/prod on a shared cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: demo-dev
  labels:
    environment: dev
    team: platform-demo
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-staging
  labels:
    environment: staging
    team: platform-demo
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-prod
  labels:
    environment: prod
    team: platform-demo
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: demo-dev
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "20"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: demo-staging
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: demo-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "50"
