# Base values shared by every environment. Environment-specific overlay
# files (values-dev.yaml, values-staging.yaml, values-prod.yaml) override
# only what needs to differ, keeping the common config in one place.
#
# Usage:
#   helm install demo-dev . -f values.yaml -f values-dev.yaml -n demo-dev --create-namespace
#   helm install demo-staging . -f values.yaml -f values-staging.yaml -n demo-staging --create-namespace
#   helm install demo-prod . -f values.yaml -f values-prod.yaml -n demo-prod --create-namespace

backend:
  image:
    repository: demo-backend
    tag: local
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

frontend:
  image:
    repository: demo-frontend
    tag: local
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 300m, memory: 256Mi }
